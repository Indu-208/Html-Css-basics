<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body{
            background-color: #555;
            width: 100%;
            height: 100vh;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container{
            background-color: white;
            max-width: 350px;
            padding: 40px;
            border-radius: 8px;
        }
        .login-header{
            text-align: center;
        }
        .login-header h1{
            margin: 0px;
            font-size: 26px;
        }

        .input-group input{
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            padding: 12px 16px;
            box-sizing: border-box;
        }
        label{
            font-weight: 600;
            margin-bottom: 10px;
        }
        .button-group{
            display: flex;
            justify-content: space-around;
        }
        .btn{
            font-size: 16px;
            padding: 12px 16px;
            width: 100%;
            margin: 10px;
            border: none;
            color: white;

        }
        .btn-login{
            background-color: rgb(54, 112, 239);
        }
        .btn-reset{
            background-color: #555;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <h1>Login Page</h1>
            <p>Admin Credentials</p>
        </div>


        <form action="#" method="#" enctype="#">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" class="username" placeholder="Enter Username"/>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="password" placeholder="Enter Your Password"/>
            </div>
            <div class="button-group">
                <button type="submit" class="btn btn-login">Login</button>
                <button type="reset" class="btn btn-reset">Reset</button>
            </div>
        </form>
    </div>
    
</body>
</html>
